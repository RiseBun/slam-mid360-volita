YAML: 1.0
# Orin NX 16GB 优化配置
# 相比默认配置，降低了计算复杂度和内存占用，以适应 ARM 平台

preprocess:
  point_filter_num: 2  # 每2个点取1个，减少输入点数 (默认1)
  lidar_type: 1 # 1-AVIA 2-velodyne 3-ouster 4-robosense 5-pandar
  blind: 0.1
  sweep_cut_num: 1
  degenerate_window_num: 10

common:
  imu_topic: /livox/imu
  lid_topic: /livox/lidar
  gnorm: 1
  map_save_path: ""
  map_voxel_size: 0.1  # 增大体素 (默认0.05)，降低地图密度

mapping:
  extrinsic_est_en: true
  extrinsic_T: [0, 0, 0]
  extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]

map_options:
  map_type: MULTI_RESOLUTION_VOXEL_HASHMAP
  resolutions:
    # 降低分辨率，减少 voxel 数量和内存占用
    - resolution: 0.3      # 0.2 → 0.3
      max_num_points: 15   # 20 → 15
      min_distance_between_points: 0.08
    - resolution: 0.8      # 0.5 → 0.8
      max_num_points: 15   # 20 → 15
      min_distance_between_points: 0.2
    - resolution: 1.5      # 1.2 → 1.5
      max_num_points: 30   # 40 → 30
      min_distance_between_points: 0.3
  neig_options:
    distance_max: 60       # 80 → 60，减少搜索范围
    radius_min: 0.3        # 0.2 → 0.3
    radius_max: 1.5        # 1.2 → 1.5
    exponent: 1.0

delay_time: 0.2

odometry:
  surf_res: 0.6            # 0.5 → 0.6，降低表面采样密度
  log_print: false
  max_num_iteration: 6     # 10 → 6，减少 ICP 迭代次数
  ceres_iterations: 3      # 5 → 3，减少 Ceres 优化迭代
  ceres_threads: 4         # 3 → 4，Orin NX 有8核，可以多开线程
  # ct_icp
  icpmodel: CT_POINT_TO_PLANE
  size_voxel_map: 0.6      # 0.5 → 0.6
  min_distance_points: 0.2 # 0.15 → 0.2
  max_num_points_in_voxel: 15  # 20 → 15
  max_distance: 60.0       # 80 → 60，更激进的 FOV 清理
  weight_alpha: 0.9
  weight_neighborhood: 0.1
  max_dist_to_plane_icp: 0.3
  init_num_frames: 20
  voxel_neighborhood: 1
  max_number_neighbors: 15  # 20 → 15
  threshold_voxel_occupancy: 1
  estimate_normal_from_neighborhood: true
  min_number_neighbors: 15  # 20 → 15
  power_planarity: 2.0
  num_closest_neighbors: 1

  sampling_rate: 1.0       # 1.5 → 1.0，降低采样率
  max_num_residuals: 800   # 1200 → 800，减少残差数量
  min_num_residuals: 30    # 50 → 30
  motion_compensation: CONSTANT_VELOCITY
  beta_location_consistency: 0.001
  beta_orientation_consistency: 0.1
  beta_constant_velocity: 0.001
  beta_small_velocity: 0.01

  thres_translation_norm: 0.01
  thres_orientation_norm: 0.1

  satu_acc: 19.5
  satu_gyro: 16
